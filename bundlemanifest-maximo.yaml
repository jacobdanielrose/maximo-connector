apiVersion: connectors.aiops.ibm.com/v1beta1
kind: BundleManifest
metadata:
  name: maximo-connector
spec:
  prereqs:
    repo: 'https://github.com/jacobdanielrose/maximo-connector.git'
    branch: main
    authSecret:
      name: maximo-github-token
    components:
      - name: deployment
        path: /bundle-artifacts/prereqs
        type: kustomize
  instanced:
    repo: 'https://github.com/jacobdanielrose/maximo-connector.git'
    branch: main
    authSecret:
      name: maximo-github-token
    components:
      - name: connector
        path: /bundle-artifacts/connector
        type: kustomize

