apiVersion: connectors.aiops.ibm.com/v1beta1
kind: ConnectorSchema
metadata:
  name: maximo-connector
  labels:
    aiops-connector-category-ticketing: "true"
spec:
  categories:
    - tickets
    - events
  ceType: com.ibm.aiops.connectors.configuration
  components:
    - apiType: AsyncAPI
      name: connector
  documentation: >-
    https://www.ibm.com/docs/en/cloud-paks/cp-waiops/4.3.0?topic=integrations-configuring-ticketing-integration
  permissions:
    channels:
      - name: cp4waiops-cartridge.lifecycle.input.events
        operations:
          - write
      - name: cp4waiops-cartridge.itsmincidentresponse
        operations:
          - write
      - name: cp4waiops-cartridge.lifecycle.input.connector-responses
        operations:
          - write
      - name: cp4waiops-cartridge.lifecycle.output.connector-requests
        operations:
          - read
  encryptedFields:
    - /password
    - /apiKey
  schema:
    allOf:
      - required:
          - url
          - authType
    properties:
      authType:
        type: string
        enum:
          - basic
          - apikey
          - oauth
        default: basic
      url:
        type: string
      username:
        type: string
      password:
        format: secret
        type: string
      apiKey:
        format: secret
        type: string
      oauthTokenUrl:
        type: string
      oauthClientId:
        type: string
      oauthClientSecret:
        format: secret
        type: string
      maximoOrgId:
        type: string
        default: EAGLENA
      maximoSiteId:
        type: string
      types:
        type: string
      issueSamplingRate:
        type: integer
      datasource_type:
        description: List of categories
        items:
          type: string
        type: array
      historical_config:
        additionalProperties: false
        properties:
          collectionMode:
            default: historical
            enum:
              - historical
            type: string
          end_date:
            format: date-time
            type: string
          start_date:
            format: date-time
            type: string
        required:
          - collectionMode
          - start_date
          - end_date
        type: object
      mappings:
        description: The incident creation mappings
        type: string
    type: object
  uiSchema:
    type: maximo-connector
    displayName: "IBM Maximo"
    iconFileType: png
    iconFileSize: 96
    categories:
      - "{{connector.common.category.notifications}}"
    url: https://ibm.biz/int-maximo
    apiAdaptor: grpc
    datasourceType: tickets
    sidePanelTitle: "Configuring an IBM Maximo integration"
    sidePanelDescription: "Connect IBM Cloud Pak for AIOps with IBM Maximo to create, update, and close incidents automatically."
    sidePanelInfoHeader: "{{sidePanel.information.header}}"
    sidePanelInfo:
      - "{{common.egress_warning}}"
      - "This integration supports Maximo Application Suite (MAS) and traditional Maximo deployments."
      - "Supports multiple authentication methods: Basic Auth, API Key, and OAuth 2.0."
    hasOptionalConfig: true
    sidePanelOptionalConfigHeader: "{{sidePanel.optional.config.header}}"
    sidePanelOptionalConfigList:
      - "{{sidePanel.optional.config.fieldMappingSearch}}"
    hasOptionalText: false
    hasAIModelType: true
    isObserver: false
    deploymentType: ["local", "remote"]
    AIModelTypeList:
      - "{{sidePanel.AIModelTypes.changeRisk}}"
      - "{{sidePanel.AIModelTypes.similarIncidents}}"
    formSteps:
      - step:
          id: addConnection
          name: "{{formSteps.addConnection}}"
      - step:
          id: fieldMapping
          name: "{{formSteps.fieldMapping}}"
          isOptional: true
      - step:
          id: collectTickets
          name: "{{formSteps.collectTickets}}"
          isOptional: true
    form:
      - id: type
        element: input
        type: hiddenText
        defaultValue: ["tickets"]
        apiMapping: connection_config.datasource_type
        formStep: addConnection
      - id: name
        element: input
        type: text
        label: "{{connector.common.form.uniqueID.label}}"
        placeholder: "{{connector.common.form.ops_integration_name.placeholder}}"
        apiMapping: connection_config.display_name
        formStep: addConnection
        isRequired: true
        maxCharLength: 50
        isDisabledOnUpdate: true
        isAlphanumeric: true
      - id: description
        element: input
        type: textarea
        label: "{{connector.common.form.description.label}}"
        placeholder: "{{connector.common.form.description.placeholder}}"
        apiMapping: connection_config.description
        formStep: addConnection
        maxCharLength: 600
      - id: url
        element: input
        type: text
        label: "Maximo URL"
        helperText: "Enter the base URL of your Maximo instance (e.g., https://maximo.example.com)"
        apiMapping: connection_config.url
        formStep: addConnection
        isRequired: true
        isURL: true
      - id: authType
        element: input
        type: radio
        label: "Authentication Type"
        items:
          - "Basic Authentication"
          - "API Key"
          - "OAuth 2.0"
        itemKeys: ["basic", "apikey", "oauth"]
        apiMapping: connection_config.authType
        formStep: addConnection
        form:
          - id: basic
            rows:
              - id: username
                element: input
                type: text
                label: "Username"
                placeholder: "Enter Maximo username"
                apiMapping: connection_config.username
                isRequired: true
              - id: password
                element: input
                type: password
                label: "Password"
                helperText: "Enter Maximo password"
                apiMapping: connection_config.password
                isRequired: true
          - id: apikey
            rows:
              - id: apiKey
                element: input
                type: password
                label: "API Key"
                helperText: "Enter your Maximo API Key"
                apiMapping: connection_config.apiKey
                isRequired: true
          - id: oauth
            rows:
              - id: oauthTokenUrl
                element: input
                type: text
                label: "OAuth Token URL"
                placeholder: "https://maximo.example.com/oauth/token"
                apiMapping: connection_config.oauthTokenUrl
                isRequired: true
              - id: oauthClientId
                element: input
                type: text
                label: "Client ID"
                placeholder: "Enter OAuth Client ID"
                apiMapping: connection_config.oauthClientId
                isRequired: true
              - id: oauthClientSecret
                element: input
                type: password
                label: "Client Secret"
                helperText: "Enter OAuth Client Secret"
                apiMapping: connection_config.oauthClientSecret
                isRequired: true
      - id: maximoOrgId
        element: input
        type: text
        label: "Maximo Organization ID"
        placeholder: "EAGLENA"
        defaultValue: "EAGLENA"
        helperText: "Enter your Maximo organization ID"
        apiMapping: connection_config.maximoOrgId
        formStep: addConnection
        isRequired: true
      - id: maximoSiteId
        element: input
        type: text
        label: "Maximo Site ID (Optional)"
        placeholder: "Enter site ID if required"
        apiMapping: connection_config.maximoSiteId
        formStep: addConnection
      - id: orchestration
        element: input
        type: radio
        label: "{{connector.common.form.orchestration.label}}"
        items:
          - "{{common.filtering.local}}"
          - "{{common.filtering.remote}}"
        itemKeys: ["local", "microedge"]
        apiMapping: connection_config.deploymentType
        formStep: addConnection
        form:
          - id: local
          - id: microedge
            rows:
              - id: technology_notification
                element: input
                type: notification
                kind: info
                hideCloseButton: true
                title: "{{common.note}}"
                subtitle: "{{connection.appdynamics.deployment.notification}}"
      - id: connection_test
        element: input
        type: test
        label: "{{connector.common.form.connection_test.label}}"
        helperText: "{{connector.common.form.connection_test.helperText}}"
        formStep: addConnection
      - id: data_flow
        element: input
        type: toggle
        defaultToggled: false
        label: "{{connector.common.form.data_flow.label}}"
        labelOff: "{{common.Off}}"
        labelOn: "{{common.On}}"
        headerLabel: "{{connector.common.form.ticketCollection.headerLabel}}"
        apiMapping: connection_config.data_flow
        formStep: collectTickets
      - id: dynamic_schedule_form
        element: form
        label: "{{common.mode}}"
        items:
          - "{{connection_form.dynamic_item.live.tickets}}"
          - "{{connection_form.dynamic_item.historical.tickets}}"
        itemKeys: ["live", "historical"]
        apiMapping: connection_config.collectionMode
        formStep: collectTickets
        form:
          - id: live
            rows:
              - id: issueSamplingRate
                element: input
                type: number
                label: "Incident Sampling Rate (minutes)"
                min: 1
                max: 60
                step: 1
                defaultValue: 5
                helperText: "How often to poll Maximo for new incidents (in minutes)"
                apiMapping: connection_config.issueSamplingRate
                formStep: collectTickets
                isRequired: true
          - id: historical
            rows:
              - id: start
                element: input
                type: date
                label: "{{connector.common.form.start_date.label}}"
                placeholder: "{{connector.common.form.start_date.placeholder}}"
                apiMapping: connection_config.start
              - id: end
                element: input
                type: date
                label: "{{connector.common.form.end_date.label}}"
                placeholder: "{{connector.common.form.end_date.placeholder}}"
                apiMapping: connection_config.end
      - id: mappings
        element: input
        type: emailJsonata
        headerLabel: "Field Mapping Configuration"
        headerLabelLink: https://ibm.biz/int-maximo
        label: "Incident Field Mappings"
        isRequired: true
        apiMapping: connection_config.mappings
        formStep: fieldMapping
        defaultValue: |
          ({
              "description": $join(["Incident Id:", $string(incident.id),
                             "\nAIOPS Incident Overview URL: https://", $string(URL_PREFIX), "/aiops/default/resolution-hub/incidents/all/", $string(incident.id), "/overview",
                             "\nStatus: ", $string(incident.state),
                             "\nDescription: ", $string(incident.description)]),
              "description_longdescription": $string(incident.description),
              "reportedby": "AIOPS",
              "affectedperson": "AIOPS",
              "status": "NEW",
              "reportdate": $now(),
              "siteid": $string(SITE_ID),
              "orgid": $string(ORG_ID)
          })

